version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: DataFlowMapper.API/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Host=db;Port=5432;Database=dataflow;Username=postgres;Password=dev123
      - SignalR__HubUrl=http://backend:8080/hubs/execution
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: dev123
      POSTGRES_DB: dataflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
